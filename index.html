  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[GasAja] Service Worker registered scope:', reg.scope))
            .catch(err => console.error('[GasAja] Service Worker registration failed:', err));
        });
